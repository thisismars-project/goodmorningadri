<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Aboard Pak Adri! 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; min-height: 100vh; 
            font-family: 'Poppins', sans-serif;
            color: #333;
        }

        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url('BG.JPG'); 
            background-repeat: repeat;
            background-size: 300px;
            filter: brightness(0.8);
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            gap: 20px;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 35px 25px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { font-size: 1.8rem; margin: 10px 0; font-weight: 700; color: #1a1a1a; }
        .sub { font-size: 0.95rem; margin-bottom: 25px; color: #444; }

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 250px;
            margin: 20px 0;
            background-image: url('PETA.PNG'); /* Nama file asli kamu */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .head-icon {
            width: 60px; height: 60px;
            object-fit: contain;
        }

        /* Hanya kepala Intan yang goyang */
        .intul-head-animate {
            animation: happyDance 2s infinite ease-in-out;
        }

        @keyframes happyDance {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg) translateY(-5px); }
        }
        
        /* Posisi Jakarta tanpa tulisan */
        .jakarta-area { position: absolute; top: 110px; left: 18%; }

        /* Adri Terbang & Berhenti Pas di Ambon (Jarak Diperpendek) */
        .adri-flight {
            position: absolute;
            display: flex;
            align-items: center;
            top: 155px; left: 32%; 
            z-index: 10;
            animation: flyToAmbon 5s forwards ease-out;
        }

        @keyframes flyToAmbon {
    0% { transform: translate(0, 0); opacity: 0; }
    15% { opacity: 1; }
    /* Angka 110px adalah hasil 'rem' supaya nggak sampai Papua */
    100% { transform: translate(110px, -45px); opacity: 1; }
}
        }

        .plane-emoji { font-size: 1.8rem; margin-right: 5px; }

        .facts-box {
            text-align: left;
            padding: 0 10px;
            margin-top: 25px;
        }
        .facts-box h3 { font-size: 0.9rem; margin-bottom: 12px; font-weight: 700; }
        .facts-list { list-style: none; padding: 0; font-size: 0.85rem; color: #333; }
        .facts-list li { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; line-height: 1.4; }

        .footer-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 600px;
            padding: 18px;
            border-radius: 20px;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>

    <div class="container">
        <div class="main-card">
            <h1>Welcome aboard Pak Adri! 🚀</h1>
            <p class="sub">Selamat pagi dan semangat bekerja hari ini!</p>

            <div class="map-wrapper">
                <!-- Jakarta (Hanya Kepala) -->
                <div class="jakarta-area">
                    <img src="Intul%20Head.png" class="head-icon intul-head-animate">
                </div>

                <!-- Adri Terbang -->
                <div class="adri-flight">
                    <span class="plane-emoji">✈️</span>
                    <img src="Adri%20Head.png" class="head-icon">
                </div>

                <!-- Ambon Target (Hanya Pulau) -->
                <div style="position: absolute; right: 28%; top: 48%; text-align: center;">
                    <span style="font-size: 2rem;">🏝️</span>
                </div>
            </div>

            <div class="facts-box">
                <h3>fun facts and random reminders:</h3>
                <ul class="facts-list">
                    <li>📅 &nbsp; Today marks 157 days kita bersama!</li>
                    <li>🤌🏻 &nbsp; I still love you the same</li>
                    <li>💬 &nbsp; ...maybe even moreee ❤️</li>
                </ul>
            </div>
        </div>

        <div class="footer-card">
            Safe flight, kesayangan Intulll 🦦🥳💃🏻
        </div>
    </div>

</body>
</html>
